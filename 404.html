<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — GJA Consulting</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{ --ink:#1e2023; --slate:#585c5f; --bone-2:#f5f2ee; --stone:#6b6f73; --brass:#a6843c; --brass-l:#c4a55f; --line-d:rgba(237,233,228,0.18); }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{min-height:100vh;background:var(--ink);color:var(--bone-2);font-family:'Inter',sans-serif;
      display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;gap:1.4rem;}
    .eyebrow{font-size:12px;font-weight:500;letter-spacing:0.24em;text-transform:uppercase;color:var(--brass-l);}
    h1{font-family:'Fraunces',Georgia,serif;font-weight:400;font-size:clamp(40px,8vw,84px);letter-spacing:-0.02em;line-height:1;}
    p{color:rgba(237,233,228,0.78);max-width:42ch;line-height:1.7;}
    .home{margin-top:0.8rem;display:inline-flex;align-items:center;gap:0.5rem;background:var(--brass);color:var(--ink);
      text-decoration:none;font-weight:600;font-size:14px;padding:0.85rem 1.5rem;transition:background 0.2s;}
    .home:hover{background:var(--brass-l);}
    .home:focus-visible{outline:2px solid var(--brass-l);outline-offset:2px;}
  </style>
</head>
<body>
  <span class="eyebrow">GJA Consulting</span>
  <h1>404</h1>
  <p>That page has moved or never existed. Let's get you back on track.</p>
  <a class="home" href="/">Back to home</a>

</html>
